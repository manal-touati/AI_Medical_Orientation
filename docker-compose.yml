version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ia_gen_medical_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:16
    container_name: ia_gen_medical_db
    environment:
      POSTGRES_DB: medical_orientation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ia_gen_medical_frontend
    depends_on:
      - api
    environment:
      API_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    restart: unless-stopped
    command: streamlit run front/app.py --server.address 0.0.0.0 --server.port 8501

volumes:
  postgres_data:

  db:
    image: postgres:16
    container_name: ia_gen_medical_db
    environment:
      POSTGRES_DB: medical_orientation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
